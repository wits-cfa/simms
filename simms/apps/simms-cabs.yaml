cabs:
  skysim:
    info: Create empty MS using simms
    command: simms skysim

    inputs:
      ms:
        info: Measurement set
        dtype: MS
        required: yes
        must_exist: yes
        policies:
          positional: true
      ascii-sky: 
        info: Catalogue of sources. A full description of accepted units can be found in the documentation.
        dtype: File
        required: no
        abbreviation: as
      fits-sky:
        info: FITS file(s) containing the sky model
        dtype: Union[File, List[File]]
        required: no
        abbreviation: fs
      wsclean-sky:
        info: WSClean component list (point and Gaussian components, Stokes I).
        dtype: File
        required: no
        abbreviation: ws
      fits-sky-interp:
        info: >-
          Interpolation method when the MS and FITS frequency grids do not match and the
          cube is kept. 'nearest' costs about 1e-3 in flux; prefer an analytic spectrum
          (--fits-spectrum poly) where the spectrum allows it.
        dtype: str
        default: linear
        choices:
        - nearest
        - linear
        - cubic
        abbreviation: fsi
      polarisation:
        info: Simulate all available stokes parameters (correlations). If false, only consider stokes I
        default: true
        dtype:  bool
        abbreviation: pol
      pol-basis:
        info: Polarization basis for the simulation. The default is circular polarization.
        dtype: str
        default: linear
        choices: ['linear', 'circular']
      pixel-tol:
        info: minimum brightness for a pixel to be considered in direct Fourier transform
        dtype: float
        required: no
        default: 1e-7
        abbreviation: pt
      fits-spectrum:
        info: >-
          How the FITS sky model varies with frequency. 'flat' is one frequency-independent
          plane; 'poly' is a flux at a reference frequency times a per-pixel log-polynomial;
          'cube' keeps the explicit planes. 'auto' fits a log-polynomial to a cube and falls
          back to the cube when the fit is poor.
        dtype: str
        default: auto
        choices: ['auto', 'flat', 'poly', 'cube']
        abbreviation: fsp
      fits-spi:
        info: >-
          Spectral-index (and higher-order) coefficient maps, ordered c1, c2, ... Given these,
          the spectrum is analytic and nothing is fitted. Requires --fits-ref-freq.
        dtype: List[File]
        required: no
      fits-ref-freq:
        info: Reference frequency (Hz) of an analytic FITS spectrum. Defaults to the MS band centre.
        dtype: float
        required: no
        abbreviation: frf
      fits-spectrum-order:
        info: Order of the fitted log-polynomial spectrum. 1 is a plain spectral index.
        dtype: int
        default: 2
      predict-backend:
        info: >-
          Backend for FITS sky model prediction. 'dft' is exact for any projection;
          'fft' grids the image, reprojecting to SIN when necessary; 'perchan' predicts
          a cube one channel at a time, skipping empty channels and choosing dft or fft
          per channel. 'auto' uses 'perchan' for a cube and the cheaper of dft/fft for a
          single-plane model.
        dtype: str
        default: auto
        choices: ['auto', 'dft', 'fft', 'perchan']
        abbreviation: pb
      fft-precision:
        info: Precision of the FFT calculation. The default is double precision.
        dtype: str
        default: double
        choices: ['single', 'double']
      do-wstacking:
        info: Whether to use w-stacking for FFT-based visibility prediction.
        dtype: bool
        default: true
      ascii-delimiter: 
        info: Delimiter that is used in the ascii-sky 
        dtype: str
        abbreviation: ad
      column:
        info: Data column for simulation
        dtype: str
        default: DATA
        abbreviation: col
      nworkers:
        info: Number of workers (one per CPU)
        dtype: int
        default: 4
      row-chunks:
        info: Number of rows per chunk. Controls the row-wise task/memory granularity.
        dtype: int
        default: 10000
        abbreviation: rcs
      chan-chunks:
        info: Number of channels per chunk. Defaults to all channels in one chunk.
        dtype: int
        required: no
        abbreviation: ccs
      primary-beam:
        info: >-
          Path to a beam-config YAML mapping each ANTENNA TELESCOPE_NAME to a beam model
          (e.g. "MK: {jimbeam: L}"). Applies a per-antenna, parallactic-rotating primary
          beam to component skies (ASCII/WSClean). Requires a linear pol basis.
        dtype: File
        required: no
        abbreviation: pb
      beam-band:
        info: Default band for JimBeam entries that omit an explicit model/CSV.
        dtype: str
        default: L
        choices: ['UHF', 'L']
      beam-pa-step:
        info: >-
          Spacing (degrees) of the parallactic-angle grid the beam is sampled on and
          interpolated from. Smaller is more accurate but uses more memory/compute.
        dtype: float
        default: 1.0
      beam-jones:
        info: >-
          Primary-beam application for component skies. "diagonal" applies a per-feed
          voltage (fast, linear correlations only). "full" applies the complete 2x2
          E-Jones (models cross-hand leakage from FITS beam cubes and supports circular
          correlations); requires 4 correlations. Ignored on the FITS-image path.
        dtype: str
        default: diagonal
        choices: ['diagonal', 'full']
      telescope-name-column:
        info: >-
          Name of the ANTENNA-table column holding the per-antenna telescope/type label
          that maps to a beam model. Must match the column telsim wrote (default
          TELESCOPE_NAME). The primary beam requires this column; it is never inferred.
        dtype: str
        default: TELESCOPE_NAME
        abbreviation: tnc
      field-id:
        info: Field ID
        dtype: int
        default: 0
        abbreviation: fi
      spw-id:
        info: Spectral Window ID
        dtype: int
        default: 0
      sefd:
        info: Add noise using the this SEFD value
        dtype: float
      seed:
        info: >-
          Random seed for the thermal noise, reproducible across runs at a fixed
          chunking. Omit for a non-reproducible run.
        dtype: int
        required: no
      ascii-species:
        info: Non-simms sky model type. 
        dtype: str
        abbreviation: asp
        choices: [bdsf_gaul, aegean, wsclean]
      input-column:
        info: Input column (see option --mode)
        dtype: str
        abbreviation: ic
      mode:
        info: Simulation mode. To create a new column use "sim"; to add to column use "add"; to subtract from column use "subtract".
        dtype: str
        default: sim
        choices: ['sim', 'add', 'subtract']
      source_schema:
        info: Specify a custom source schema via a YAML file that specifies how to map columns in custom sky model to the columns expected by simms.
              See the bdsf_gaul schema file at 'https://github.com/wits-cfa/simms/tree/main/simms/schemas'
        dtype: File
        required: no

  telsim:
    info: Create empty MS using simms
    command: simms telsim
    inputs:
      ms:
        info: Observation name/id/label
        dtype: MS
        must_exist: no
        required: yes
        policies:
          positional: true
      telescope:
        info: Name of telescope you are simulating
        dtype: str
        required: yes
        abbreviation: tel
      subarray-list: 
        info: Custom list of antennas to use, e.g., M000,M005,SKA009. If specified, this must be a subarray of the given telescope.
        dtype: List[str]
        required: no
        abbreviation: sublist
      subarray-range:
        info: Custom range of antennas indices to use, e.g. start,end,step where step is optional. If specified, this must be a subarray of the given telescope.
        dtype: List[int]
        required: no
        abbreviation: subrange
      subarray-file:
        info: File with list of custom antennas to use, e.g., /path/to/subarray.yaml. File should contain antnames key, e.g., [M000,M005,SKA009]. This must be a subarray of the given telescope.
        dtype: File
        required: no
        abbreviation: subfile
      telescope-name-column:
        info: Name of the ANTENNA-table column that holds the per-antenna telescope/type label (used by skysim to select a primary beam). Provisional spec; configurable so skysim can be pointed at the same name.
        dtype: str
        default: TELESCOPE_NAME
        abbreviation: tnc
      direction:
        info: Direction of field centre for MS. Example, J2000,0h24m20s,-30d12m33s or J2000,0:24:20,-30:12:33. Default is J2000,1h0m0s,-31d0m0s.
        dtype: str
        metavar: '[EPOCH,]RA,Dec'
        default: 'J2000,1h0m0s,-31d0m0s'
        abbreviation: dir
      starttime: 
        info: Observation start time in UTC. For example, '2024-03-14T06:15:10'. Default is the current machine time.
        metavar: 'YYYY-MM-DDTHH:MM:SS'
        dtype: str
        abbreviation: st
      startha:
        info: Hour angle at start of observation. Can be used instead of date.
        dtype: float
        abbreviation: sha
      dtime:
        info: Integration/exposure time in seconds. Default is 8 seconds.
        dtype: float
        default: 8
        abbreviation: dt
      ntime:
        info: Number of times slots for MS. Default is 10.
        dtype: int
        default: 10
        abbreviation: nt
      startfreq:
        info: Centre of first frequency channel/bin, e.g 0.55GHz. If given without units, Hertz are assumed. Default is 1420MHz.
        dtype: Union[str, float]
        default: 1420MHz
        abbreviation: sf
      dfreq:
        info: Channel width and units, e.g 2.4MHz. If given without units, Hertz are assumed. Default is 1MHz.
        dtype: Union[str, float]
        default: 1MHz
        abbreviation: df
      nchan:
        info: Number of frequency channels. Default is 9.
        dtype: int
        default: 9
        abbreviation: nc
      correlations:
        info: Feed correlations for MS, e.g., 'XX,YY'. Default is 'XX,YY'.
        dtype: str
        default: XX,YY
        abbreviation: corr
      nworkers:
        info: Number of workers (one per CPU). Default is 4.
        dtype: int
        default: 4
      rowchunks:
        info: Number of chunks to divide the data into, larger number of chunks improves the computation speed. Default is 50000.
        dtype: int
        default: 50000
        abbreviation: rc
      column:
        info: The column in which to corrupt the visibilities with noise. Default is MODEL_DATA column.
        dtype: str
        default: 'MODEL_DATA'
        abbreviation: col
      sefd:
        info: Antenna SEFD (one value for all frequencies)
        dtype: float
      tsys-over-eta:
        info: Antenna system temperature over aperture efficiency (one value for all frequencies) 
        dtype: float
        abbreviation: tos
      sensitivity-file: 
        info: File with antenna spectral sensitivity information. Allowed keys (column names) are 'freq, tsys, sefd, tsys_over_eta'
        dtype: File 
        abbreviation: sfile
      low-source-limit:
        info: Minimum source elevation in degrees that is considered reliable data. The data recorded when the source is below this value is flagged.
        dtype: float
        abbreviation: lsl
      high-source-limit:
        info: Maximum source elevation in degrees that is considered reliable data. The data recorded when the source is above this value is flagged.
        dtype: float
        abbreviation: hsl
      freq-range:
        info: A list containing the start frequency, end frequency, and number of channels, e.g., startfreq,endfreq,nchan.
        dtype: str
        abbreviation: fr
      smooth: 
        info: If you have provided a sensitivity file with frequencies and their corresponding sefd or tsys_over_eta, then we will fit to get the approximate sefd matching the MS frequencies. There are two fitting options, polyn and spline.
        dtype: str
      fit-order:
        info: The fitting order to use when approximating the MS frequencies SEFDs. 
        dtype: int
        abbreviation: fo
        

  primary-beam:
    info: >-
      Primary-beam utilities (no visibility simulation): build a FITS beam cube from a
      cosine-taper model (to-fits), tag an MS with per-antenna telescope names (tag-ms),
      or multiply/divide a sky model by the frequency- and time-averaged beam (apply/correct).
    inputs:
      mode:
        info: Operation to perform.
        dtype: str
        choices: [to-fits, tag-ms, apply, correct]
        required: yes
        policies:
          positional: true
      beam-pattern:
        info: >-
          Beam model: a cosine-taper CSV path, a built-in name (e.g. MKAT-EA-L-JIM-2026),
          a band shorthand (L/UHF), or a FITS beam cube (.fits). Used by to-fits/apply/correct.
        dtype: str
        abbreviation: bp
      beam-band:
        info: Default band for a built-in beam when beam-pattern omits one.
        dtype: str
        default: L
        choices: [UHF, L]
      beam-pa-step:
        info: Parallactic-angle sampling step (degrees) for the time-averaged beam.
        dtype: float
        default: 1.0
      ms:
        info: Measurement set (time/parallactic-angle range, array position and frequencies). Required for tag-ms/apply/correct.
        dtype: MS
        required: no
      fits-sky:
        info: Input FITS image sky model (apply/correct).
        dtype: File
        abbreviation: fits
      ascii-sky:
        info: Input ASCII component sky model (apply/correct).
        dtype: File
        abbreviation: ascii
      output:
        info: Output path - FITS beam (to-fits) or beamed/corrected sky model (apply/correct).
        dtype: str
        abbreviation: o
      telescope-name-column:
        info: ANTENNA-table column holding the per-antenna telescope/type label (tag-ms).
        dtype: str
        default: TELESCOPE_NAME
        abbreviation: tnc
      label:
        info: Single telescope-name label applied to all antennas (tag-ms).
        dtype: str
      label-map:
        info: YAML mapping antenna NAME -> telescope-name label (tag-ms).
        dtype: File
      from-layout:
        info: simms layout whose per-antenna telescope_name is matched to the MS antenna names (tag-ms).
        dtype: str
      pb-cutoff:
        info: In correct mode, blank (NaN) where the beam is below this level.
        dtype: float
        default: 0.1
      pixel-size:
        info: Angular pixel size for the to-fits grid, e.g. "1arcmin" or "0.02deg".
        dtype: str
        default: 1arcmin
      npix:
        info: Number of pixels per side for the to-fits grid.
        dtype: int
        default: 256
      start-freq:
        info: Start frequency of the to-fits cube, e.g. "856MHz". Defaults to the beam's first tabulated frequency.
        dtype: str
        abbreviation: sf
      chan-width:
        info: Channel width of the to-fits cube, e.g. "10MHz". Defaults to spanning the beam's frequency range across --nchan.
        dtype: str
        abbreviation: cw
      nchan:
        info: Number of output channels in the to-fits cube. Defaults to the beam's tabulated channel count.
        dtype: int
        required: no
        abbreviation: nc
      nworkers:
        info: Number of worker threads.
        dtype: int
        default: 4
